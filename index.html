<!DOCTYPE html>
<html>
<head>
    <title>Minecraft Infinite Web</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 20px; z-index: 100; pointer-events: none; }
        
        /* Durdurma Menüsü */
        #pause-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
        }
        .menu-btn {
            width: 200px; padding: 15px; margin: 10px; background: #555; border: 3px solid #000;
            color: white; cursor: pointer; text-align: center; font-weight: bold;
        }
        .menu-btn:hover { background: #777; }

        #hotbar {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            width: 364px; height: 44px; background: rgba(0,0,0,0.5); border: 2px solid #333;
            display: flex; gap: 2px; padding: 2px;
        }
    </style>
</head>
<body>

    <div id="crosshair">+</div>

    <div id="pause-menu">
        <h1 style="color: white;">OYUN DURDURULDU</h1>
        <div class="menu-btn" onclick="resumeGame()">DEVAM ET</div>
        <div class="menu-btn" onclick="location.reload()">YENİDEN BAŞLAT</div>
    </div>

    <div id="hotbar">
        <div style="width:40px; height:40px; border:2px solid white;"></div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';
        import { SimplexNoise } from 'https://cdn.skypack.dev/simplex-noise';

        // --- KURULUM ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const simplex = new SimplexNoise();
        const controls = new PointerLockControls(camera, document.body);
        const chunks = new Map();
        const chunkSize = 16;
        const renderDistance = 3; // 3x3 chunk alanı (Performans için)

        // --- SHADER & MATERYALLER ---
        const loader = new THREE.TextureLoader();
        const grassTex = loader.load('https://i.imgur.com/v6S7vS7.png');
        grassTex.magFilter = THREE.NearestFilter;

        // Basit Shader: Dalgalanan Çim Efekti (Rüzgar)
        const blockMaterial = new THREE.MeshLambertMaterial({ map: grassTex });

        // --- DÜNYA ÜRETİMİ (SONSUZ) ---
        function generateChunk(cx, cz) {
            const group = new THREE.Group();
            for (let x = 0; x < chunkSize; x++) {
                for (let z = 0; z < chunkSize; z++) {
                    const absX = cx * chunkSize + x;
                    const absZ = cz * chunkSize + z;
                    
                    // Yükseklik haritası (16 Trilyon bloğa kadar matematiksel süreklilik)
                    const h = Math.floor(simplex.noise2D(absX / 30, absZ / 30) * 4 + 5);
                    
                    const geo = new THREE.BoxGeometry(1, 1, 1);
                    const cube = new THREE.Mesh(geo, blockMaterial);
                    cube.position.set(absX, h, absZ);
                    group.add(cube);

                    // AĞAÇ YAPILARI (Structure)
                    if (Math.abs(simplex.noise2D(absX, absZ)) > 0.95) {
                        createTree(group, absX, h + 1, absZ);
                    }
                }
            }
            scene.add(group);
            return group;
        }

        function createTree(group, x, y, z) {
            const logMat = new THREE.MeshLambertMaterial({ color: 0x5d4037 });
            const leafMat = new THREE.MeshLambertMaterial({ color: 0x2e7d32 });
            const geo = new THREE.BoxGeometry(1, 1, 1);

            // Gövde
            for (let i = 0; i < 4; i++) {
                const log = new THREE.Mesh(geo, logMat);
                log.position.set(x, y + i, z);
                group.add(log);
            }
            // Yapraklar
            for (let ix = -1; ix <= 1; ix++) {
                for (let iy = 3; iy <= 5; iy++) {
                    for (let iz = -1; iz <= 1; iz++) {
                        const leaf = new THREE.Mesh(geo, leafMat);
                        leaf.position.set(x + ix, y + iy, z + iz);
                        group.add(leaf);
                    }
                }
            }
        }

        // --- GÜNCELLEME DÖNGÜSÜ ---
        function updateChunks() {
            const pX = Math.floor(camera.position.x / chunkSize);
            const pZ = Math.floor(camera.position.z / chunkSize);

            for (let x = pX - renderDistance; x <= pX + renderDistance; x++) {
                for (let z = pZ - renderDistance; z <= pZ + renderDistance; z++) {
                    const key = `${x},${z}`;
                    if (!chunks.has(key)) {
                        chunks.set(key, generateChunk(x, z));
                    }
                }
            }
        }

        // --- KONTROLLER ---
        let velocity = new THREE.Vector3();
        let moveF = false, moveB = false, moveL = false, moveR = false;

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Escape') {
                document.getElementById('pause-menu').style.display = 'flex';
                controls.unlock();
            }
            if (!controls.isLocked) return;
            if (e.code === 'KeyW') moveF = true;
            if (e.code === 'KeyS') moveB = true;
            if (e.code === 'KeyA') moveL = true;
            if (e.code === 'KeyD') moveR = true;
            if (e.code === 'Space' && camera.position.y <= 12) velocity.y = 5;
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') moveF = false;
            if (e.code === 'KeyS') moveB = false;
            if (e.code === 'KeyA') moveL = false;
            if (e.code === 'KeyD') moveR = false;
        });

        window.resumeGame = () => {
            controls.lock();
            document.getElementById('pause-menu').style.display = 'none';
        };

        // --- IŞIKLANDIRMA ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 50, 10);
        scene.add(sun);

        camera.position.set(0, 15, 0);

        function animate() {
            requestAnimationFrame(animate);
            if (controls.isLocked) {
                const delta = 0.016;
                velocity.x -= velocity.x * 10 * delta;
                velocity.z -= velocity.z * 10 * delta;
                velocity.y -= 15 * delta;

                if (moveF) velocity.z += 50 * delta;
                if (moveB) velocity.z -= 50 * delta;
                if (moveL) velocity.x -= 50 * delta;
                if (moveR) velocity.x += 50 * delta;

                controls.moveForward(velocity.z * delta);
                controls.moveRight(velocity.x * delta);
                camera.position.y += velocity.y * delta;

                if (camera.position.y < 10) {
                    velocity.y = 0;
                    camera.position.y = 10;
                }

                updateChunks();
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
